<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaloonSave - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>

    <header class="mobile-header">
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo-mobile">
            <h1>SaloonSave</h1>
            <div class="logo-icon"><i class="fas fa-scissors"></i></div>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>

            <div class="sidebar-logo-desktop">
                <div class="logo-icon"><i class="fas fa-scissors"></i></div>
                <div class="logo-text">
                    <h1>SaloonSave</h1>
                    <span>Sistema de Gestão</span>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li class="active"><a href="#"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a></li>
                <li><a href="#"><i class="fas fa-calendar-alt"></i> <span>Agenda</span></a></li>
                <li><a href="#"><i class="fas fa-users"></i> <span>Clientes</span></a></li>
                <li><a href="#"><i class="fas fa-cut"></i> <span>Serviços</span></a></li>
                <li><a href="#"><i class="fas fa-user-tie"></i> <span>Profissionais</span></a></li>
                <li><a href="#"><i class="fas fa-box"></i> <span>Estoque</span></a></li>
                <li><a href="#"><i class="fas fa-dollar-sign"></i> <span>Financeiro</span></a></li>
            </ul>
        </nav>

    </aside>

    <main class="content">
        <h1>Dashboard</h1>
        <p>Bem-vindo ao painel administrativo do SaloonSave.</p>
    </main>

    <script src="/js/script.js"></script>
</body>

</html>
